<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #3a2a2a);
  color: #f5e6e0;
  text-align: center;
  overflow-x: hidden;
}

.container { padding: 40px 20px; }
.hidden { display:none; }

button {
  padding: 15px 25px;
  border-radius: 25px;
  border: none;
  background: #fff;
  color: #000;
  cursor: pointer;
  margin-top: 20px;
}

.card {
  margin-top: 25px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
}

input {
  padding: 12px;
  width: 80%;
  border-radius: 20px;
  border: none;
  text-align: center;
}

#poem {
  white-space: pre-line;
  line-height: 1.6;
  font-size: 18px;
}

/* IMAGE BOX */
#imageBox img {
  width: 80%;
  border-radius: 15px;
  opacity: 0;
  transition: opacity 1s ease;
}

#quote {
  margin-top: 15px;
  font-style: italic;
}

/* TEDDY */
#teddy {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
  animation: floatTeddy 3s infinite;
}

@keyframes floatTeddy {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* HEARTS */
.heart-float {
  position: fixed;
  bottom: -20px;
  color: black;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}

/* GLOW */
#poem {
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 15px #ff4d6d; }
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- LOCK -->
<div class="container" id="lock">
  <h2>When did I confess my love? 💖</h2>
  <input id="dateInput" placeholder="DD/MM/YYYY">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- FLOW -->
<div class="container hidden" id="step1">
  <h2>Tap to open 💌</h2>
  <button onclick="next('step1','step2')">Open</button>
</div>

<div class="container hidden" id="step2">
  <h2>Best memory with me? 💭</h2>
  <input id="q1">
  <button onclick="next('step2','step3')">Next</button>
</div>

<div class="container hidden" id="step3">
  <h2>What makes us special? 💞</h2>
  <input id="q2">
  <button onclick="next('step3','step4')">Next</button>
</div>

<div class="container hidden" id="step4">
  <h2>How do you feel about us? ❤️</h2>
  <input id="q3">
  <button onclick="generatePoem()">Reveal ✨</button>
</div>

<!-- RESULT -->
<div class="container hidden" id="result">
  <div id="poem" class="card"></div>

  <div id="imageBox">
    <img id="currentImage">
    <div id="quote"></div>
  </div>
</div>

<img id="teddy" src="https://media.tenor.com/0AVbKGY_MxMAAAAi/teddy-bear.gif">

<script>

/* IMAGES */
const images = [
  "image1.jpg","image2.jpg","image3.jpg","image4.jpg",
  "image5.jpg","image7.jpg","image8.jpg"
];

/* QUOTES */
const quotes = [
  "With you, even silence feels special ❤️",
  "Every moment with you is my favorite 💫",
  "You are my calm and my chaos 💞",
  "Your smile is my world 🌍",
  "You are my peace 🤍",
  "Time stops with you ⏳",
  "You are my happiness 💖",
  "It’s always you ❤️"
];

/* MUSIC */
function playSmoothMusic() {
  const music = document.getElementById('music');
  music.volume = 0;
  music.play().catch(()=>{});

  let v = 0;
  const fade = setInterval(()=>{
    if(v < 0.3){ v += 0.01; music.volume = v; }
    else clearInterval(fade);
  },300);
}

/* UNLOCK */
function unlock() {
  if(document.getElementById('dateInput').value === "25/06/2024") {
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
    startHearts();
    playSmoothMusic();
  } else {
    alert("Try again 💭");
  }
}

function next(c,n){
  document.getElementById(c).classList.add('hidden');
  document.getElementById(n).classList.remove('hidden');
}

/* POEM GENERATOR */
function generatePoem(){
  const m = document.getElementById('q1').value;
  const u = document.getElementById('q2').value;
  const f = document.getElementById('q3').value;

  const endings = [
    "நீ நலமா இருந்தா தான் நான் சந்தோஷம் ❤️",
    "உன்ன கவனிக்குறதுல தான் என் காதல் இருக்குது 💞",
    "நீ தான் என் அமைதி 🤍",
    "உன்ன சிரிக்க வைக்க தான் என் வாழ்க்கை 💖"
  ];

  const ending = endings[Math.floor(Math.random()*endings.length)];

  const poem = `
${m}… அந்த நினைவு இன்னும் என் மனசுல இருக்குது ❤️

${u}… அது நம்ம காதலோட அடையாளம் 💞

நீ நினைச்சாலே… எனக்கு ${f} தான் உணர்ச்சி 😌

${ending}
`;

  document.getElementById('step4').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

  typeWriter(poem);
  showImages();
}

/* TYPING */
function typeWriter(text) {
  const el = document.getElementById("poem");
  el.innerHTML = "";
  let i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;

      const teddy = document.getElementById("teddy");
      teddy.style.transform = "scale(1.2)";
      setTimeout(()=>teddy.style.transform="scale(1)",200);

      setTimeout(type, 25);
    }
  }
  type();
}

/* IMAGE FLOW */
function showImages(){
  let i=0;
  const img = document.getElementById('currentImage');
  const q = document.getElementById('quote');

  setInterval(()=>{
    img.style.opacity = 0;

    setTimeout(()=>{
      img.src = images[i];
      q.innerText = quotes[i];
      img.style.opacity = 1;
      i = (i+1) % images.length;
    },500);

  },2500);
}

/* HEARTS */
function startHearts(){
  setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart-float';
    h.innerHTML='❤️';
    h.style.left=Math.random()*100+'vw';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}

</script>

</body>
</html>
