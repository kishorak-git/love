<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #2a1a14);
  color: #ffe5d9;
  text-align: center;
}

/* GLASS CARD */
.card {
  background: rgba(255, 228, 213, 0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  width: 85%;
  margin: 20px auto;
  box-shadow: 0 0 20px rgba(255, 200, 170, 0.15);
}

.hidden { display: none; }

input {
  padding: 10px;
  width: 70%;
  border-radius: 20px;
  border: none;
  background: rgba(255, 200, 170, 0.2);
  color: #fff;
  text-align: center;
}

button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: #ff8c6a;
  color: #000;
  font-weight: bold;
  margin-top: 15px;
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

/* IMAGE */
#frame img {
  width: 220px;
  height: 280px;
  border-radius: 15px;
  margin-top: 20px;
  object-fit: cover;
}

/* POEM */
#poem {
  white-space: pre-line;
  font-size: 17px;
  line-height: 1.5;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #ffb199; }
  to { text-shadow: 0 0 15px #ff8c6a; }
}

/* TEDDY */
#teddy {
  position: fixed;
  bottom: 15px;
  right: 15px;
  width: 70px;
  animation: float 3s infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- LOCK -->
<div class="card" id="lock">
  <h3>When did I confess my love? 💖</h3>
  <input id="dateInput" placeholder="DD/MM/YYYY">
  <br>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- STEP -->
<div class="card hidden" id="step1">
  <h3>Tap to begin 💌</h3>
  <button onclick="next()">Start</button>
</div>

<div class="card hidden" id="step2">
  <h3>Best memory with me? 💭</h3>
  <input id="q1">
  <button onclick="next2()">Next</button>
</div>

<div class="card hidden" id="step3">
  <h3>What makes us special? 💞</h3>
  <input id="q2">
  <button onclick="show()">Reveal ❤️</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="result">
  <div id="poem"></div>
  <div id="frame"><img id="img"></div>
  <div id="quote"></div>
</div>

<img id="teddy" src="https://media.tenor.com/0AVbKGY_MxMAAAAi/teddy-bear.gif">

<script>

const images = [
"image1.jpg","image2.jpg","image3.jpg","image4.jpg",
"image5.jpg","image6.jpg","image7.jpg","image8.jpg"
];

const quotes = [
"You are my peace ❤️",
"You are my safe place 🫶",
"With you, everything feels right 💫",
"You are my forever 💍",
"My heart belongs to you 💖",
"You complete me 🌹"
];

/* AUDIO FIX (STRONGEST VERSION) */
function playMusic(){
  const m = document.getElementById("music");

  m.play().then(()=> {
    m.volume = 0;
    let v = 0;

    const fade = setInterval(()=>{
      if(v < 0.3){
        v += 0.01;
        m.volume = v;
      } else clearInterval(fade);
    },200);

  }).catch(()=> {
    // fallback: play on next click
    document.body.addEventListener("click", ()=>{
      m.play();
    }, {once:true});
  });
}

/* FLOW */
function unlock(){
  if(document.getElementById("dateInput").value === "25/06/2024"){
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("step1").classList.remove("hidden");
    playMusic();
  } else {
    alert("Try again 💭");
  }
}

function next(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

function next2(){
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
}

/* FINAL */
function show(){
  document.getElementById("step3").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const m = document.getElementById("q1").value;
  const u = document.getElementById("q2").value;

  const poem = `
That moment… ${m} still lives in my heart 💖✨

What we share… ${u} makes us rare and beautiful 💞🌹

With you, I feel safe, calm, and loved 🥺❤️

No matter what happens… I will always choose you 💍💫
`;

  typeWriter(poem);

  document.getElementById("img").src =
    images[Math.floor(Math.random()*images.length)];

  document.getElementById("quote").innerText =
    quotes[Math.floor(Math.random()*quotes.length)];
}

/* TYPE EFFECT */
function typeWriter(text){
  const el = document.getElementById("poem");
  el.innerHTML = "";
  let i = 0;

  function type(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 20);
    }
  }
  type();
}

</script>

</body>
</html>
