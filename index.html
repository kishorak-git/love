<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #2a1f1f);
  color: #f5e6e0;
  text-align: center;
}

.container { padding: 30px 15px; }
.hidden { display:none; }

/* GLASS CARD */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  width: 85%;
  margin: auto;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: #ff4d6d;
  color: #fff;
  cursor: pointer;
  margin-top: 15px;
  font-weight: bold;
}

/* SMALL INPUT */
input {
  padding: 10px;
  width: 70%;
  border-radius: 20px;
  border: none;
  text-align: center;
  margin-top: 10px;
  background: rgba(255,255,255,0.15);
  color: white;
}

#poem {
  white-space: pre-line;
  font-size: 17px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 15px #ff4d6d; }
}

#frame {
  width: 220px;
  height: 280px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
}

#frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#quote {
  margin-top: 10px;
  font-style: italic;
}

#teddy {
  position: fixed;
  bottom: 15px;
  right: 15px;
  width: 70px;
  animation: floatTeddy 3s infinite;
}

@keyframes floatTeddy {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.heart-float {
  position: fixed;
  bottom: -20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop preload="auto"></audio>

<div class="container">

<div class="glass" id="lock">
  <h3>When did I confess my love? 💖</h3>
  <input id="dateInput" placeholder="DD/MM/YYYY">
  <br>
  <button onclick="unlock()">Unlock</button>
</div>

<div class="glass hidden" id="step1">
  <h3>Tap to open 💌</h3>
  <button onclick="next('step1','step2')">Open</button>
</div>

<div class="glass hidden" id="step2">
  <h3>Best memory? 💭</h3>
  <input id="q1">
  <button onclick="next('step2','step3')">Next</button>
</div>

<div class="glass hidden" id="step3">
  <h3>What makes us special? 💞</h3>
  <input id="q2">
  <button onclick="finalReveal()">Reveal 💖</button>
</div>

<div class="glass hidden" id="result">
  <div id="poem"></div>

  <div id="frame">
    <img id="finalImage">
  </div>

  <div id="quote"></div>
</div>

</div>

<img id="teddy" src="https://media.tenor.com/0AVbKGY_MxMAAAAi/teddy-bear.gif">

<script>

const quotes = [
  "You are my peace ❤️",
  "With you, everything feels right 💫",
  "My heart feels home with you 💞",
  "You are my calm 🌙",
  "Your smile is my world 💖",
  "Forever feels easy 🤍",
  "You are my happiness ❤️",
  "Always you ❤️"
];

function playSmoothMusic() {
  const music = document.getElementById('music');

  // force play after user action
  music.muted = true;
  music.play().then(() => {
    music.muted = false;

    let vol = 0;
    music.volume = 0;

    const fade = setInterval(() => {
      if (vol < 0.3) {
        vol += 0.01;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 250);

  }).catch(() => {
    console.log("Autoplay blocked - user interaction needed");
  });
} else {
        clearInterval(fade);
      }
    }, 300);
  }).catch(()=>{});
}

function unlock(){
  if(document.getElementById('dateInput').value === "25/06/2024"){
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
    startHearts();
    playSmoothMusic();
  } else {
    alert("Try again 💭");
  }
}

function next(c,n){
  document.getElementById(c).classList.add('hidden');
  document.getElementById(n).classList.remove('hidden');
}

function finalReveal(){
  const m = document.getElementById('q1').value;
  const u = document.getElementById('q2').value;

  const images = [
    "image1.jpg","image2.jpg","image3.jpg","image4.jpg",
    "image5.jpg","image6.jpg","image7.jpg","image8.jpg"
  ];

  const img = images[Math.floor(Math.random()*images.length)];

  const poem = `
${m}… that moment still lives in my heart 💖✨

${u}… that’s what makes us so rare and beautiful 💞🌹

Whenever I think of you… I feel calm, safe, and loved 🥺❤️

No matter what happens… I’ll always choose you, again and again 💍💫`;;

  document.getElementById('step3').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

  typeWriter(poem);

  const teddy = document.getElementById('teddy');
  teddy.style.transform = "translateY(-40px)";

  setTimeout(()=>{
    document.getElementById('finalImage').src = img;
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random()*quotes.length)];
  },1000);
}

function typeWriter(text) {
  const el = document.getElementById("poem");
  el.innerHTML = "";
  let i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 25);
    }
  }
  type();
}

function startHearts(){
  setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart-float';
    h.innerHTML='❤️';
    h.style.left=Math.random()*100+'vw';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}

</script>

</body>
</html>
