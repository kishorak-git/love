<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #3a2a2a);
  color: #f5e6e0;
  text-align: center;
}

.container { padding: 40px 20px; }
.hidden { display:none; }

button {
  padding: 15px 25px;
  border-radius: 25px;
  border: none;
  background: #fff;
  color: #000;
  cursor: pointer;
  margin-top: 20px;
}

input {
  padding: 12px;
  width: 80%;
  border-radius: 20px;
  border:none;
}

.card {
  margin-top:20px;
  padding:20px;
  background: rgba(0,0,0,0.6);
  border-radius:20px;
}

#poem { white-space: pre-line; }

/* IMAGE FRAME */
#frame {
  width: 250px;
  height: 300px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

#frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#quote {
  margin-top: 15px;
  font-style: italic;
}

/* TEDDY */
#teddy {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
  animation: floatTeddy 3s infinite;
}

@keyframes floatTeddy {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* HEARTS */
.heart-float {
  position: fixed;
  bottom: -20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- LOCK -->
<div class="container" id="lock">
  <h2>When did I confess my love? 💖</h2>
  <input id="dateInput" placeholder="DD/MM/YYYY">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- FLOW -->
<div class="container hidden" id="step1">
  <h2>Tap to open 💌</h2>
  <button onclick="next('step1','step2')">Open</button>
</div>

<div class="container hidden" id="step2">
  <h2>Best memory? 💭</h2>
  <input id="q1">
  <button onclick="next('step2','step3')">Next</button>
</div>

<div class="container hidden" id="step3">
  <h2>What makes us special? 💞</h2>
  <input id="q2">
  <button onclick="finalReveal()">Reveal 💖</button>
</div>

<!-- RESULT -->
<div class="container hidden" id="result">
  <div id="poem" class="card"></div>

  <div id="frame">
    <img id="finalImage">
  </div>

  <div id="quote"></div>
</div>

<img id="teddy" src="https://media.tenor.com/0AVbKGY_MxMAAAAi/teddy-bear.gif">

<script>

/* QUOTES */
const quotes = [
  "You are my peace ❤️",
  "With you, everything feels right 💫",
  "My heart feels home with you 💞",
  "You are my calm in chaos 🌙",
  "Your smile is my world 💖",
  "Forever feels easy with you 🤍",
  "You are my happiness ❤️",
  "Always you ❤️"
];

/* MUSIC */
function playSmoothMusic() {
  const music = document.getElementById('music');
  music.volume = 0;
  music.play().catch(()=>{});

  let v = 0;
  const fade = setInterval(()=>{
    if(v < 0.3){ v += 0.01; music.volume = v; }
    else clearInterval(fade);
  },300);
}

/* UNLOCK */
function unlock(){
  if(document.getElementById('dateInput').value === "25/06/2024"){
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
    startHearts();
    playSmoothMusic();
  } else {
    alert("Try again 💭");
  }
}

function next(c,n){
  document.getElementById(c).classList.add('hidden');
  document.getElementById(n).classList.remove('hidden');
}

/* FINAL REVEAL */
function finalReveal(){
  const m = document.getElementById('q1').value;
  const u = document.getElementById('q2').value;

  const images = [
    "image1.jpg","image2.jpg","image3.jpg","image4.jpg",
    "image5.jpg","image6.jpg","image7.jpg","image8.jpg"
  ];

  const randomIndex = Math.floor(Math.random() * images.length);
  const img = images[randomIndex];

  const poem = `
${m}… அந்த நினைவு என் மனசுல இருக்குது ❤️

${u}… அது நம்ம காதலோட உண்மை 💞

நீ இருந்தா தான் எனக்கு அமைதி 😌

எதுவானாலும்… நான் உன்னோடதான் ❤️`;

  document.getElementById('step3').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

  typeWriter(poem);

  const teddy = document.getElementById('teddy');
  teddy.style.transform = "translateY(-50px)";

  setTimeout(()=>{
    document.getElementById('finalImage').src = img;

    const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('quote').innerText = randomQuote;

  },1000);
}

/* TYPE EFFECT */
function typeWriter(text) {
  const el = document.getElementById("poem");
  el.innerHTML = "";
  let i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 25);
    }
  }
  type();
}

/* HEARTS */
function startHearts(){
  setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart-float';
    h.innerHTML='❤️';
    h.style.left=Math.random()*100+'vw';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}

</script>

</body>
</html>
